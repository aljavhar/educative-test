<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish — EduTest Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e1b4b 0%, #4338ca 50%, #7c3aed 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .login-card {
            background: #fff;
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
        }
        .login-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #fff;
            margin: 0 auto 1.25rem;
        }
        .form-control {
            border-radius: 10px;
            padding: 0.65rem 1rem;
            border: 1.5px solid #e5e7eb;
            font-size: 0.95rem;
        }
        .form-control:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
        }
        .input-group-text {
            border-radius: 10px 0 0 10px;
            background: #f9fafb;
            border: 1.5px solid #e5e7eb;
            border-right: none;
            color: #6b7280;
        }
        .input-group .form-control {
            border-radius: 0 10px 10px 0;
            border-left: none;
        }
        .btn-login {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border: none;
            border-radius: 10px;
            padding: 0.7rem;
            font-weight: 600;
            font-size: 1rem;
            transition: opacity 0.2s;
        }
        .btn-login:hover { opacity: 0.9; }
        .demo-box {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: 10px;
            padding: 0.85rem;
            font-size: 0.82rem;
        }
        .demo-box .demo-title {
            font-weight: 700;
            color: #0369a1;
            margin-bottom: 0.4rem;
        }
        .demo-cred { color: #374151; }
        .demo-cred code {
            background: #fff;
            padding: 0.1rem 0.35rem;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <i class="bi bi-mortarboard-fill"></i>
        </div>
        <h4 class="text-center fw-bold mb-1">EduTest Platform</h4>
        <p class="text-center text-muted small mb-4">Ta'lim markazlari uchun test tizimi</p>

        {% if messages %}
        {% for msg in messages %}
        <div class="alert alert-danger py-2 small" role="alert">
            <i class="bi bi-exclamation-triangle me-1"></i>{{ msg }}
        </div>
        {% endfor %}
        {% endif %}

        <form method="post" action="{% url 'web:login' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold small text-muted">USERNAME</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="username" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold small text-muted">PAROL</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-login w-100 text-white">
                <i class="bi bi-box-arrow-in-right me-1"></i> Kirish
            </button>
        </form>

        <hr class="my-3">

        <!-- Demo ma'lumotlar -->
        <div class="demo-box">
            <div class="demo-title"><i class="bi bi-info-circle me-1"></i>Demo kirish ma'lumotlari</div>
            <div class="demo-cred mb-1">
                <strong>O'qituvchi:</strong> <code>teacher</code> / <code>teacher123</code>
            </div>
            <div class="demo-cred">
                <strong>O'quvchi:</strong> <code>ali</code>, <code>fatima</code>, <code>sardor</code> / <code>student123</code>
            </div>
        </div>

        <p class="text-center text-muted small mt-3 mb-0">
            <i class="bi bi-shield-lock me-1"></i>
            Xavfsiz kirish — ma'lumotlaringiz himoyalangan
        </p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
